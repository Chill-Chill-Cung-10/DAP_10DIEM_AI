services:
  app:
    build: .
    ports:
      - "3400:3400"
    mem_limit: 256m # Giới hạn theo Fly.io
    memswap_limit: 256m # Tắt swap, để test chính xác
    env_file:
      - .env
    depends_on:
      - postgres
      # - redis
  postgres:
    image: pgvector/pgvector:pg16   # có sẵn pgvector extension
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"

volumes:
  pgdata: